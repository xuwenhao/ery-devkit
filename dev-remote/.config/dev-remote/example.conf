# dev-remote profile: example
# Copy to ~/.config/dev-remote/default.conf or <name>.conf
#
# All values can also be set via environment variables.
# Config file values take precedence over env vars.

DEV_SSH_HOST="your-server.example.com"
DEV_CONTAINER_PATTERN="your-container"
DEV_CONTAINER_USER="node"
DEV_WORKSPACE="/workspaces/your-project"
DEV_FORWARD_PORTS="3000 8000"
DEV_REMOTE_PROJECT_DIR=""  # Required for auto-start via docker compose
