name: Publish openclaw-discord-autoname

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write

concurrency:
  group: publish-openclaw-discord-autoname-${{ github.event.release.tag_name }}
  cancel-in-progress: false

jobs:
  publish:
    if: startsWith(github.event.release.tag_name, 'openclaw-discord-autoname-v')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          package-manager-cache: false # npm recommends no cache for release builds

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify release tag
        working-directory: packages/openclaw-discord-autoname
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          package_version="$(node -p "require('./package.json').version")"
          test "$RELEASE_TAG" = "openclaw-discord-autoname-v$package_version"

      - name: Test
        run: pnpm --filter @xuwenhao83/openclaw-discord-autoname test

      - name: Typecheck
        run: pnpm --filter @xuwenhao83/openclaw-discord-autoname typecheck

      - name: Build
        run: pnpm --filter @xuwenhao83/openclaw-discord-autoname build

      - name: Inspect package
        working-directory: packages/openclaw-discord-autoname
        run: npm pack --dry-run --ignore-scripts

      - name: Publish
        working-directory: packages/openclaw-discord-autoname
        # npm Trusted Publishing generates provenance automatically.
        run: npm publish
