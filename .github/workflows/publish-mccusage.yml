name: Publish mccusage

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write

concurrency:
  group: publish-mccusage-${{ github.event.release.tag_name }}
  cancel-in-progress: false

jobs:
  publish:
    if: startsWith(github.event.release.tag_name, 'mccusage-v')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify release tag
        working-directory: packages/mccusage
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          package_version="$(node -p "require('./package.json').version")"
          test "$RELEASE_TAG" = "mccusage-v$package_version"

      - name: Test
        run: pnpm --filter @xuwenhao83/mccusage test

      - name: Typecheck
        run: pnpm --filter @xuwenhao83/mccusage typecheck

      - name: Build
        run: pnpm --filter @xuwenhao83/mccusage build

      - name: Inspect package
        working-directory: packages/mccusage
        run: npm pack --dry-run

      - name: Publish
        working-directory: packages/mccusage
        run: npm publish --access public
